<!DOCTYPE html>
<html>
<head>
  <title>GrocerGrade Export Tool</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin: 5px; padding: 5px; }
    button { padding: 10px; margin-top: 10px; }
    h1 { color: #0a0a0a; }
  </style>
</head>
<body>

<h1>GrocerGrade Container Calculator</h1>
<p><b>From Our Soil To Your Soul</b></p>

Length (cm): <input id="l" value="10"><br>
Width (cm): <input id="w" value="5"><br>
Height (cm): <input id="h" value="5"><br>
Weight per box (kg): <input id="wt" value="0.1"><br>

<button onclick="calc()">Calculate</button>

<h3 id="result"></h3>

<script>
function calc() {

let l = document.getElementById("l").value/100;
let w = document.getElementById("w").value/100;
let h = document.getElementById("h").value/100;
let wt = document.getElementById("wt").value;

let container = 5.89*2.33*2.4;
let box = l*w*h;

let total = Math.floor(container/box);

document.getElementById("result").innerHTML =
"Total Boxes: " + total + "<br>Total Weight: " + (total*wt) + " kg";
}
</script>

</body>
</html>
